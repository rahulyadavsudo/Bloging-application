apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: raaahulyada/bloging-application:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              value: "mongodb://admin:password123@mongo:27017/blogging-app?authSource=admin"
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000